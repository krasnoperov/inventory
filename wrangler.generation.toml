# ============================================================================
# BARE FRAMEWORK FOUNDATION - Generation Worker Configuration
# ============================================================================
# Handles generated-media workflows
# Separated from main worker for better resource isolation

account_id = "2d61278ad8b69df60cde602758926e14"
name = "makefx-generation-stage"
main = "src/worker/generation.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Stage environment routes
[[routes]]
pattern = "makefx-generation-stage.krasnoperov.me"
custom_domain = true

# D1 Database binding (same as main worker)
[[d1_databases]]
binding = "DB"
database_name = "makefx-stage"
database_id = "14827e27-7616-4056-8e77-f8fa37d03835"
migrations_dir = "db/migrations"

# KV namespace for OAuth state (same as main worker)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "b5666003e8934366a93be6e62260f495"

# Environment variables for stage
[vars]
NODE_ENV = "stage"
ENVIRONMENT = "stage"
INVENTORY_AUDIO_PROVIDER = "fake"

# Cloudflare Workflows - Generation
[[workflows]]
binding = "GENERATION_WORKFLOW"
name = "makefx-generation-workflow-stage"
class_name = "GenerationWorkflow"

# Durable Objects - Space state (needed by workflows to broadcast results)
[[durable_objects.bindings]]
name = "SPACES_DO"
class_name = "SpaceDO"
script_name = "makefx-stage"

# R2 Storage for generated images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "makefx-media-stage"

# ====================
# PRODUCTION ENVIRONMENT
# ====================
[env.production]
name = "makefx-generation-production"

# Production routes
[[env.production.routes]]
pattern = "generation.makefx.app"
custom_domain = true

# D1 Database binding - Production (same as main worker)
[[env.production.d1_databases]]
binding = "DB"
database_name = "makefx-production"
database_id = "35fc45c8-78d1-4fcf-9a18-ce252d2a5dd3"
migrations_dir = "db/migrations"

# KV namespace for OAuth state - Production (same as main worker)
[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "082128872dd74f8593326990706cd138"

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"
# Website-controlled audio generation provider (vars are not inherited from the
# top-level [vars], so production must declare it explicitly).
INVENTORY_AUDIO_PROVIDER = "elevenlabs"

# Cloudflare Workflows - Production
[[env.production.workflows]]
binding = "GENERATION_WORKFLOW"
name = "makefx-generation-workflow-production"
class_name = "GenerationWorkflow"

# Durable Objects - Production (needed by workflows)
[[env.production.durable_objects.bindings]]
name = "SPACES_DO"
class_name = "SpaceDO"
script_name = "makefx-production"

# R2 Storage - Production
[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "makefx-media-production"

# ====================
# LOCAL DEVELOPMENT
# ====================
[dev]
port = 8789  # Different port from main worker (8788)
local_protocol = "http"

# Secrets should be set via wrangler CLI:
# wrangler secret put GOOGLE_AI_API_KEY --config wrangler.generation.toml
# wrangler secret put ELEVENLABS_API_KEY --config wrangler.generation.toml
# wrangler secret put ELEVENLABS_MUSIC_MODEL_ID --config wrangler.generation.toml (optional)
# wrangler secret put ELEVENLABS_SOUND_EFFECT_MODEL_ID --config wrangler.generation.toml (optional)
# wrangler secret put LYRIA_PROJECT_ID --config wrangler.generation.toml (optional, for Lyria music)
# wrangler secret put LYRIA_ACCESS_TOKEN --config wrangler.generation.toml (optional, for Lyria music)
# wrangler secret put LYRIA_API_KEY --config wrangler.generation.toml (optional alternative auth for Lyria music)
# wrangler secret put LYRIA_MODEL_ID --config wrangler.generation.toml (optional, defaults to lyria-3-clip-preview)
# (Add other secrets as needed for your workflows)
