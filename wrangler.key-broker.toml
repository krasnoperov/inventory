# ============================================================================
# BYOK Key Broker Worker Configuration
# ============================================================================
# Isolated key-custody worker. This worker is intended to be reachable only by
# service bindings from app/generation workers, and is the only worker that
# should receive versioned BYOK_KEK_* Secrets Store bindings.
#
# Secrets Store bindings are committed here like D1/KV bindings. Do not commit
# secret values; only commit the store IDs and secret names needed by Wrangler.

account_id = "2d61278ad8b69df60cde602758926e14"
name = "makefx-key-broker-stage"
main = "src/worker/key-broker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "makefx-stage"
database_id = "14827e27-7616-4056-8e77-f8fa37d03835"
migrations_dir = "db/migrations"

[vars]
NODE_ENV = "stage"
ENVIRONMENT = "stage"
BYOK_ACTIVE_KEK_VERSION = "1"

[[secrets_store_secrets]]
binding = "BYOK_KEK_V1"
store_id = "d5c07c7e415b4830bacde18ac9e740e9"
secret_name = "MAKEFX_STAGE_BYOK_KEK_V1"

# Add BYOK_KEK_V2 only while staging or running a KEK rotation.

[env.production]
name = "makefx-key-broker-production"
workers_dev = false

[[env.production.d1_databases]]
binding = "DB"
database_name = "makefx-production"
database_id = "35fc45c8-78d1-4fcf-9a18-ce252d2a5dd3"
migrations_dir = "db/migrations"

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"
BYOK_ACTIVE_KEK_VERSION = "1"

[[env.production.secrets_store_secrets]]
binding = "BYOK_KEK_V1"
store_id = "d5c07c7e415b4830bacde18ac9e740e9"
secret_name = "MAKEFX_PRODUCTION_BYOK_KEK_V1"

# Add BYOK_KEK_V2 only while staging or running a KEK rotation.
