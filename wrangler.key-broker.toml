# ============================================================================
# BYOK Key Broker Worker Configuration
# ============================================================================
# Isolated key-custody worker. This worker is intended to be reachable only by
# service bindings from app/generation workers, and is the only worker that
# should receive versioned BYOK_KEK_* Secrets Store bindings.
#
# This config is scaffolded for human review. Do not deploy it until the target
# Secrets Store IDs and caller service bindings are confirmed.

account_id = "2d61278ad8b69df60cde602758926e14"
name = "makefx-key-broker-stage"
main = "src/worker/key-broker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "makefx-stage"
database_id = "14827e27-7616-4056-8e77-f8fa37d03835"
migrations_dir = "db/migrations"

[vars]
NODE_ENV = "stage"
ENVIRONMENT = "stage"
BYOK_ACTIVE_KEK_VERSION = "1"

# Secrets Store bindings to enable after the account store and secret names are
# reviewed:
#
# [[secrets_store_secrets]]
# binding = "BYOK_KEK_V1"
# store_id = "<secret-store-id>"
# secret_name = "BYOK_KEK_V1"
#
# [[secrets_store_secrets]]
# binding = "BYOK_KEK_V2"
# store_id = "<secret-store-id>"
# secret_name = "BYOK_KEK_V2"

[env.production]
name = "makefx-key-broker-production"
workers_dev = false

[[env.production.d1_databases]]
binding = "DB"
database_name = "makefx-production"
database_id = "35fc45c8-78d1-4fcf-9a18-ce252d2a5dd3"
migrations_dir = "db/migrations"

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"
BYOK_ACTIVE_KEK_VERSION = "1"

# Production Secrets Store binding to enable after review:
#
# [[env.production.secrets_store_secrets]]
# binding = "BYOK_KEK_V1"
# store_id = "<production-secret-store-id>"
# secret_name = "BYOK_KEK_V1"
#
# [[env.production.secrets_store_secrets]]
# binding = "BYOK_KEK_V2"
# store_id = "<production-secret-store-id>"
# secret_name = "BYOK_KEK_V2"
