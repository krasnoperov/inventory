# ============================================================================
# BARE FRAMEWORK FOUNDATION - Local Development Configuration
# ============================================================================
# Unified worker for local dev (handles HTTP + workflows in one).
# Loaded by @cloudflare/vite-plugin via `pnpm dev`.

account_id = "2d61278ad8b69df60cde602758926e14"
name = "inventory-local"
main = "src/worker/unified.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Serve the React frontend
# `binding` exposes the static assets to the worker as env.ASSETS so the
# document-navigation middleware can fetch and rewrite index.html.
[assets]
binding = "ASSETS"
directory = "./dist/frontend"
not_found_handling = "single-page-application"
run_worker_first = ["/*"]

# D1 Database binding - LOCAL (uses persistent SQLite file in .wrangler/state/v3/d1/)
[[d1_databases]]
binding = "DB"
database_name = "inventory-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "db/migrations"

# KV namespace for OAuth state
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "08f7fd3b25ac4cc59ad9e2975d510df3"

# Environment variables for local dev
[vars]
NODE_ENV = "development"
ENVIRONMENT = "local"
POLAR_ENVIRONMENT = "sandbox"
OIDC_ISSUER = "http://localhost:3001"

# Durable Objects - Space state and WebSocket (local)
[[durable_objects.bindings]]
name = "SPACES_DO"
class_name = "SpaceDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SpaceDO"]

# Cloudflare Workflows - Generation (local)
[[workflows]]
binding = "GENERATION_WORKFLOW"
name = "inventory-generation-workflow-local"
class_name = "GenerationWorkflow"

# R2 Storage for generated images (local uses miniflare's R2 simulation)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "inventory-images-local"
