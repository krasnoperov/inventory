# ============================================================================
# BARE FRAMEWORK FOUNDATION - Main Worker Configuration
# ============================================================================
# Handles HTTP requests (API + Frontend)
# Generation worker handles generated-media workflows (see wrangler.generation.toml)

account_id = "2d61278ad8b69df60cde602758926e14"
name = "makefx-stage"
main = "src/worker/unified.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Serve the React frontend
# `binding` exposes the static assets to the worker as env.ASSETS so the
# document-navigation middleware can fetch and rewrite index.html.
[assets]
binding = "ASSETS"
directory = "./dist/frontend"
not_found_handling = "single-page-application"
run_worker_first = ["/*"]

# Stage environment custom domain
[[routes]]
pattern = "makefx-stage.krasnoperov.me"
custom_domain = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "makefx-stage"
database_id = "14827e27-7616-4056-8e77-f8fa37d03835"
migrations_dir = "db/migrations"

# KV namespace for OAuth state
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "b5666003e8934366a93be6e62260f495"

# Environment variables for stage
[vars]
NODE_ENV = "stage"
ENVIRONMENT = "stage"
POLAR_ENVIRONMENT = "sandbox"
INVENTORY_AUDIO_PROVIDER = "fake"
# Comma-separated user IDs allowed to access billing admin routes
ADMIN_USER_IDS = ""

# Durable Objects - Space state and WebSocket
[[durable_objects.bindings]]
name = "SPACES_DO"
class_name = "SpaceDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SpaceDO"]

# Cloudflare Workflows - Generation
[[workflows]]
binding = "GENERATION_WORKFLOW"
name = "makefx-generation-workflow-stage"
class_name = "GenerationWorkflow"

# R2 Storage for generated images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "makefx-media-stage"

# Cron Triggers - Moved to dedicated billing worker (wrangler.polar.toml)
# [triggers]
# crons = ["*/5 * * * *"]

# ====================
# PRODUCTION ENVIRONMENT
# ====================
[env.production]
name = "makefx-production"

# Production custom domains
[[env.production.routes]]
pattern = "makefx.app"
custom_domain = true

# D1 Database binding - Production
[[env.production.d1_databases]]
binding = "DB"
database_name = "makefx-production"
database_id = "35fc45c8-78d1-4fcf-9a18-ce252d2a5dd3"
migrations_dir = "db/migrations"

# KV namespace for OAuth state - Production
[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "082128872dd74f8593326990706cd138"

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"
POLAR_ENVIRONMENT = "production"
# Website-controlled audio generation provider (vars are not inherited from the
# top-level [vars], so production must declare it explicitly).
INVENTORY_AUDIO_PROVIDER = "elevenlabs"
# Comma-separated user IDs. Grants billing-admin routes AND non-billable
# ('internal') paid-generation access to every tool.
ADMIN_USER_IDS = "1"

# Durable Objects - Production
[[env.production.durable_objects.bindings]]
name = "SPACES_DO"
class_name = "SpaceDO"

# Cloudflare Workflows - Production
[[env.production.workflows]]
binding = "GENERATION_WORKFLOW"
name = "makefx-generation-workflow-production"
class_name = "GenerationWorkflow"

# R2 Storage for generated images - Production
[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "makefx-media-production"

# Cron Triggers - Moved to dedicated billing worker (wrangler.polar.toml)
# [env.production.triggers]
# crons = ["*/5 * * * *"]

# ====================
# LOCAL DEVELOPMENT
# ====================
# NOTE: Local development uses wrangler.dev.toml with unified worker
[dev]
port = 8788
local_protocol = "http"

# Secrets should be set via wrangler CLI:
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put OIDC_PRIVATE_KEY_BASE64
# wrangler secret put OIDC_KEY_ID
# wrangler secret put OIDC_ISSUER
# wrangler secret put OIDC_AUDIENCE
# wrangler secret put GOOGLE_AI_API_KEY (optional, for NanoBananaService)
# wrangler secret put ELEVENLABS_API_KEY (required in production; voices are chosen per generation in the UI/CLI)
# wrangler secret put ELEVENLABS_MUSIC_MODEL_ID (optional, for ElevenLabs music)
# wrangler secret put ELEVENLABS_SOUND_EFFECT_MODEL_ID (optional, for ElevenLabs sound effects)
# wrangler secret put LYRIA_PROJECT_ID (optional, for Lyria music)
# wrangler secret put LYRIA_ACCESS_TOKEN (optional, for Lyria music)
# wrangler secret put LYRIA_API_KEY (optional alternative auth for Lyria music)
# wrangler secret put LYRIA_MODEL_ID (optional, defaults to lyria-3-clip-preview)
# wrangler secret put ANTHROPIC_API_KEY (optional, for ClaudeService)
# wrangler secret put POLAR_ACCESS_TOKEN (optional, for Polar.sh billing)
# wrangler secret put POLAR_ORGANIZATION_ID (optional, for Polar.sh billing)
# wrangler secret put POLAR_PAID_GENERATION_PRODUCT_ID (optional, for checkout)
# wrangler secret put POLAR_WEBHOOK_SECRET (optional, for Polar webhook verification)
