name: CI

on:
  push:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --dns-result-order=ipv4first
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  COREPACK_HOME: /tmp/corepack

permissions:
  contents: read
  pull-requests: read

jobs:
  Tests:
    name: Tests
    runs-on:
      - self-hosted
      - self-hosted-container
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1000:1000
      volumes:
        - /home/alv/cache/inventory/pnpm-store:/pnpm-store
    env:
      npm_config_store_dir: /pnpm-store
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only change
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          case "${{ github.event_name }}" in
            push)
              BASE='${{ github.event.before }}'
              if [[ "$BASE" =~ ^0+$ ]]; then
                git fetch --depth=50 origin main:refs/remotes/origin/main 2>/dev/null || true
                BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
              fi
              ;;
            merge_group)
              BASE='${{ github.event.merge_group.base_sha }}'
              ;;
            *)
              BASE=''
              ;;
          esac

          if [[ -z "$BASE" ]] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "Cannot resolve diff base - running full tests."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Diff base: $BASE"
          echo "Changed files:"
          printf '  %s\n' $CHANGED

          if [[ -z "$CHANGED" ]]; then
            echo "Empty diff - running tests to be safe."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$CHANGED" | grep -qvE '^(docs|faq)/|^\.github/workflows/|^[A-Z][A-Z0-9_]*\.md$'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "All changes are content/workflow/meta-doc only - skipping tests."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable pnpm via corepack
        if: steps.detect.outputs.skip != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin" pnpm
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - if: steps.detect.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Write .env
        if: steps.detect.outputs.skip != 'true'
        run: |
          node --input-type=module <<'NODE'
          import { Buffer } from 'node:buffer';
          import { writeFileSync } from 'node:fs';
          import { generateKeyPair, exportPKCS8, exportSPKI } from 'jose';

          const { privateKey, publicKey } = await generateKeyPair('ES256', { extractable: true });
          const privatePem = await exportPKCS8(privateKey);
          const publicPem = await exportSPKI(publicKey);

          const env = {
            GOOGLE_CLIENT_ID: 'test-google-client-id',
            GOOGLE_CLIENT_SECRET: 'test-google-client-secret',
            OIDC_PRIVATE_KEY: privatePem,
            OIDC_PRIVATE_KEY_BASE64: Buffer.from(privatePem).toString('base64'),
            OIDC_PUBLIC_KEY: publicPem,
            OIDC_KEY_ID: 'ci-key',
            OIDC_ISSUER: 'https://ci.inventory.test',
            OIDC_AUDIENCE: 'forgetray-api',
            OIDC_ALLOWED_CLIENT_IDS: '["inventory-cli"]',
          };

          writeFileSync(
            '.env',
            Object.entries(env).map(([key, value]) => `${key}=${JSON.stringify(value)}`).join('\n'),
          );
          NODE

      - name: Pre-push checks
        if: steps.detect.outputs.skip != 'true'
        run: pnpm run ci:pre-push

      - name: Upload component failure diffs
        if: failure() && steps.detect.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: component-failure-diffs
          path: |
            test-results/components/**/test-failed-*.png
            test-results/components/**/*-actual.png
            test-results/components/**/*-expected.png
            test-results/components/**/*-diff.png
          retention-days: 1
          if-no-files-found: ignore

      - name: Workspace cleanup
        if: always() && steps.detect.outputs.skip != 'true'
        run: |
          rm -rf node_modules dist test-results playwright-report .vite || true
          git gc --auto || true
