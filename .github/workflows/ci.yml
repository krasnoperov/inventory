name: CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --dns-result-order=ipv4first

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    name: Checks
    runs-on:
      - self-hosted
      - self-hosted-container
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1000:1000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci --include=dev --loglevel=error

      - name: Write .env
        run: |
          node --input-type=module <<'NODE'
          import { Buffer } from 'node:buffer';
          import { writeFileSync } from 'node:fs';
          import { generateKeyPair, exportPKCS8, exportSPKI } from 'jose';

          const { privateKey, publicKey } = await generateKeyPair('ES256', { extractable: true });
          const privatePem = await exportPKCS8(privateKey);
          const publicPem = await exportSPKI(publicKey);

          const env = {
            GOOGLE_CLIENT_ID: 'test-google-client-id',
            GOOGLE_CLIENT_SECRET: 'test-google-client-secret',
            OIDC_PRIVATE_KEY: privatePem,
            OIDC_PRIVATE_KEY_BASE64: Buffer.from(privatePem).toString('base64'),
            OIDC_PUBLIC_KEY: publicPem,
            OIDC_KEY_ID: 'ci-key',
            OIDC_ISSUER: 'https://ci.inventory.test',
            OIDC_AUDIENCE: 'forgetray-api',
            OIDC_ALLOWED_CLIENT_IDS: '["inventory-cli"]',
          };

          writeFileSync(
            '.env',
            Object.entries(env).map(([key, value]) => `${key}=${JSON.stringify(value)}`).join('\n'),
          );
          NODE

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --test-reporter=dot

  Tests:
    name: Tests
    if: always()
    needs:
      - checks
    runs-on:
      - self-hosted
    steps:
      - name: Evaluate CI gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const blocking = Object.entries(needs).filter(([, value]) =>
            !["success", "skipped"].includes(value.result),
          );

          if (blocking.length > 0) {
            console.error(
              `Blocking jobs: ${blocking.map(([name, value]) => `${name}=${value.result}`).join(", ")}`,
            );
            process.exit(1);
          }

          console.log(
            `Tests gate passed: ${Object.entries(needs).map(([name, value]) => `${name}=${value.result}`).join(", ")}`,
          );
          NODE
