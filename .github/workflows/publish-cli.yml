name: Publish CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. v0.1.1"
        required: true

env:
  COREPACK_HOME: /tmp/corepack

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish makefx CLI to npm
    # npm Trusted Publishing requires a GitHub-hosted runner. Test workflows run
    # on the repo's self-hosted runners; keep publish on ubuntu-latest and do
    # not run the full ci:pre-push suite here.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve and validate release tag
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            candidate="$INPUT_TAG"
          else
            candidate="$REF_NAME"
          fi

          if ! printf '%s' "$candidate" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Ref '$candidate' is not a valid release tag (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          echo "ref=$candidate" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm via corepack
        run: |
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin" pnpm
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify tag matches package version
        env:
          TAG: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail

          tag_version="${TAG#v}"
          pkg_version="$(node -p "require('./package.json').version")"

          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $TAG (=> $tag_version) does not match package.json version $pkg_version"
            exit 1
          fi

          echo "Publishing makefx@$pkg_version"

      - name: Refuse to republish an existing version
        run: |
          set -euo pipefail

          pkg_version="$(node -p "require('./package.json').version")"
          if npm view "makefx@$pkg_version" version >/dev/null 2>&1; then
            echo "::error::makefx@$pkg_version is already on npm; bump package.json first"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:cli

      - name: Verify lean publish manifest
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const pkg = JSON.parse(readFileSync('dist/npm/package.json', 'utf8'));
          const deps = Object.keys(pkg.dependencies ?? {});
          if (deps.length > 0) {
            throw new Error(`CLI publish package must not declare runtime dependencies: ${deps.join(', ')}`);
          }
          if (pkg.private) {
            throw new Error('CLI publish package must not be private');
          }
          if (pkg.bin?.makefx !== './makefx.mjs') {
            throw new Error('CLI publish package must expose ./makefx.mjs as the makefx binary');
          }
          NODE

      - name: Inspect package contents
        run: npm pack ./dist/npm --dry-run

      - name: Publish to npm
        run: npm publish ./dist/npm --access public --provenance
