name: Publish CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  COREPACK_HOME: /tmp/corepack

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish makefx CLI to npm
    # npm Trusted Publishing requires a GitHub-hosted runner. Test workflows run
    # on the repo's self-hosted runners; keep publish on ubuntu-latest and do
    # not run the full ci:pre-push suite here.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require main ref
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Publish CLI must run from main."
          exit 1

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm via corepack
        run: |
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin" pnpm
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Resolve package version
        id: package
        run: |
          set -euo pipefail

          pkg_version="$(node -p "require('./package.json').version")"
          echo "version=${pkg_version}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${pkg_version}"

      - name: Check npm registry
        id: registry
        run: |
          set -euo pipefail

          pkg_version="${{ steps.package.outputs.version }}"
          if npm view "makefx@$pkg_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "makefx@$pkg_version is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "makefx@$pkg_version is not on npm; publishing."
          fi

      - run: pnpm install --frozen-lockfile
        if: steps.registry.outputs.published != 'true'

      - run: pnpm run build:cli
        if: steps.registry.outputs.published != 'true'

      - name: Verify lean publish manifest
        if: steps.registry.outputs.published != 'true'
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const pkg = JSON.parse(readFileSync('dist/npm/package.json', 'utf8'));
          const deps = Object.keys(pkg.dependencies ?? {});
          if (deps.length > 0) {
            throw new Error(`CLI publish package must not declare runtime dependencies: ${deps.join(', ')}`);
          }
          if (pkg.private) {
            throw new Error('CLI publish package must not be private');
          }
          if (pkg.bin?.makefx !== 'makefx.mjs') {
            throw new Error('CLI publish package must expose makefx.mjs as the makefx binary');
          }
          NODE

      - name: Inspect package contents
        if: steps.registry.outputs.published != 'true'
        run: npm pack ./dist/npm --dry-run

      - name: Publish to npm
        if: steps.registry.outputs.published != 'true'
        run: npm publish ./dist/npm --access public --provenance
